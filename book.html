<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novaris — বইয়ের বিস্তারিত</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Novaris</a>
      <div class="navbar-links">
        <span id="customer-nav-slot" class="navbar-account"></span>
        <a href="cart.html" class="navbar-cart" aria-label="কার্ট">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="container">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> হোমে ফিরুন</a>

    <div id="book-detail">
      <p class="loading-state">বইটি খোঁজা হচ্ছে…</p>
    </div>
  </div>

  <div id="site-footer"></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { getBookById } from './books.js';
    import { addToCart, renderCartBadge } from './cart.js';

    const params = new URLSearchParams(window.location.search);
    const bookId = params.get('id');
    const book = bookId ? await getBookById(bookId) : null;

    const container = document.getElementById('book-detail');

    if (!book) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-book"></i>
          <p>দুঃখিত, বইটি খুঁজে পাওয়া যায়নি।</p>
        </div>
      `;
    } else {
      const hasDiscount = book.regularPrice && book.regularPrice > book.currentPrice;

      const optionalFields = [
        ['প্রকাশনী', book.publisher],
        ['সংস্করণ', book.edition],
        ['বাঁধাই', book.bindingType],
        ['কাগজ', book.paperType]
      ].filter(([, value]) => value);

      container.innerHTML = `
        <div class="detail-layout">
          <div class="detail-cover-wrap">
            <img src="${book.coverImage}" alt="${book.title}">
          </div>
          <div>
            <h1>${book.title}</h1>
            <p class="book-card-author">${book.author} · ${book.pages} পৃষ্ঠা</p>

            <div class="detail-price-row">
              <span class="price-current">৳${book.currentPrice}</span>
              ${hasDiscount ? `<span class="price-regular">৳${book.regularPrice}</span>` : ''}
            </div>

            <p>${book.description}</p>

            ${optionalFields.length ? `
              <dl class="detail-meta">
                ${optionalFields.map(([label, value]) => `<dt>${label}</dt><dd>${value}</dd>`).join('')}
              </dl>
            ` : ''}

            <div class="detail-actions">
              ${book.inStock ? `
                <div class="qty-stepper" id="add-qty-stepper">
                  <button type="button" class="qty-btn qty-minus" aria-label="কমান" disabled>
                    <i class="fa-solid fa-minus"></i>
                  </button>
                  <span class="qty-value" id="add-qty-value">1</span>
                  <button type="button" class="qty-btn qty-plus" aria-label="বাড়ান">
                    <i class="fa-solid fa-plus"></i>
                  </button>
                </div>
                <button id="add-to-cart-btn" class="btn btn-primary">
                  <i class="fa-solid fa-cart-plus"></i> কার্টে যোগ করুন
                </button>
              ` : `
                <span class="stock-msg"><i class="fa-solid fa-ban"></i> স্টকে নেই</span>
              `}
            </div>
          </div>
        </div>
      `;

      let addQty = 1;
      const stepper = document.getElementById('add-qty-stepper');
      if (stepper) {
        const qtyValueEl = document.getElementById('add-qty-value');
        const minusBtn = stepper.querySelector('.qty-minus');
        const plusBtn = stepper.querySelector('.qty-plus');
        minusBtn.addEventListener('click', () => {
          if (addQty <= 1) return;
          addQty -= 1;
          qtyValueEl.textContent = addQty;
          minusBtn.disabled = addQty <= 1;
        });
        plusBtn.addEventListener('click', () => {
          addQty += 1;
          qtyValueEl.textContent = addQty;
          minusBtn.disabled = false;
        });
      }

      const addBtn = document.getElementById('add-to-cart-btn');
      if (addBtn) {
        addBtn.addEventListener('click', () => {
          addToCart(book, 'book', addQty);
          showToast('কার্টে যোগ করা হয়েছে ✓');
        });
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    renderCartBadge();
  </script>
  <script type="module" src="customer-nav.js"></script>
  <script type="module" src="footer.js"></script>
</body>
</html>
