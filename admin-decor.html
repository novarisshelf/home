<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novaris — ডেকর পরিচালনা</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="owner-bar">
    <div class="owner-bar-inner">
      <div class="owner-bar-links">
        <a href="dashboard.html">অর্ডার</a>
        <a href="admin.html">বই পরিচালনা</a>
        <a href="admin-decor.html" class="active">ডেকর পরিচালনা</a>
      </div>
      <button class="owner-logout" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> লগআউট</button>
    </div>
  </div>

  <div class="container">
    <h1 style="margin-top: 24px;">ডেকর পরিচালনা</h1>

    <div class="admin-grid">
      <div class="card">
        <h2 id="form-title">নতুন পণ্য যোগ করুন</h2>
        <form id="item-form">
          <div class="form-group">
            <label class="form-label" for="f-title">নাম *</label>
            <input class="form-input" id="f-title" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-category">ক্যাটাগরি *</label>
            <select class="form-select" id="f-category" required>
              <option value="">— নির্বাচন করুন —</option>
              <option value="Hobby & Collectibles">Hobby &amp; Collectibles</option>
              <option value="ঘর সাজানোর জিনিস">ঘর সাজানোর জিনিস</option>
            </select>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="f-material">উপাদান</label>
              <input class="form-input" id="f-material" placeholder="যেমন: সিরামিক">
            </div>
            <div class="form-group">
              <label class="form-label" for="f-dimensions">মাপ</label>
              <input class="form-input" id="f-dimensions" placeholder="যেমন: ৩০ x ২০ সেমি">
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="f-current-price">বর্তমান মূল্য *</label>
              <input class="form-input" type="number" id="f-current-price" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-regular-price">নিয়মিত মূল্য</label>
              <input class="form-input" type="number" id="f-regular-price" min="0">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-cover">ছবির URL *</label>
            <input class="form-input" type="url" id="f-cover" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-description">বিবরণ</label>
            <textarea class="form-textarea" id="f-description"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">
              <input type="checkbox" id="f-instock" checked style="width:auto; margin-right:6px;">
              স্টকে আছে
            </label>
          </div>

          <p class="form-error" id="form-error" style="display:none;"></p>

          <div style="display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary" id="submit-btn">
              <i class="fa-solid fa-plus"></i> যোগ করুন
            </button>
            <button type="button" class="btn btn-outline" id="cancel-edit-btn" style="display:none;">বাতিল</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>বর্তমান পণ্যসমূহ</h2>
        <div id="items-list">
          <p class="loading-state">লোড হচ্ছে…</p>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script type="module">
    import { requireAuth, logoutUser } from './js/auth.js';
    import { fetchDecorItemsLive, addDecorItem, updateDecorItem, deleteDecorItem } from './js/admin-decor.js';

    await requireAuth();

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await logoutUser();
      window.location.href = 'login.html';
    });

    const form = document.getElementById('item-form');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-edit-btn');
    const formError = document.getElementById('form-error');
    const listEl = document.getElementById('items-list');

    const fields = {
      title: document.getElementById('f-title'),
      category: document.getElementById('f-category'),
      material: document.getElementById('f-material'),
      dimensions: document.getElementById('f-dimensions'),
      currentPrice: document.getElementById('f-current-price'),
      regularPrice: document.getElementById('f-regular-price'),
      coverImage: document.getElementById('f-cover'),
      description: document.getElementById('f-description'),
      inStock: document.getElementById('f-instock')
    };

    let editingId = null;

    function resetForm() {
      form.reset();
      fields.inStock.checked = true;
      editingId = null;
      formTitle.textContent = 'নতুন পণ্য যোগ করুন';
      submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> যোগ করুন';
      cancelBtn.style.display = 'none';
    }

    function fillForm(item) {
      fields.title.value = item.title || '';
      fields.category.value = item.category || '';
      fields.material.value = item.material || '';
      fields.dimensions.value = item.dimensions || '';
      fields.currentPrice.value = item.currentPrice || '';
      fields.regularPrice.value = item.regularPrice || '';
      fields.coverImage.value = item.coverImage || '';
      fields.description.value = item.description || '';
      fields.inStock.checked = item.inStock !== false;

      editingId = item.id;
      formTitle.textContent = 'পণ্য সম্পাদনা করুন';
      submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> আপডেট করুন';
      cancelBtn.style.display = 'inline-flex';
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function readForm() {
      const data = {
        title: fields.title.value.trim(),
        category: fields.category.value,
        material: fields.material.value.trim(),
        dimensions: fields.dimensions.value.trim(),
        currentPrice: parseFloat(fields.currentPrice.value) || 0,
        coverImage: fields.coverImage.value.trim(),
        description: fields.description.value.trim(),
        inStock: fields.inStock.checked
      };
      if (fields.regularPrice.value) {
        data.regularPrice = parseFloat(fields.regularPrice.value);
      } else if (editingId) {
        // Left blank while editing means "remove the discount" — see admin-decor.js.
        data.regularPrice = null;
      }
      return data;
    }

    async function loadItems() {
      try {
        const liveItems = await fetchDecorItemsLive();
        if (liveItems.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-box-open"></i>
              <p>এখনো কোনো পণ্য যোগ করা হয়নি।</p>
            </div>
          `;
          return;
        }
        listEl.innerHTML = liveItems.map((item) => `
          <div class="admin-book-row">
            <img class="admin-book-thumb" src="${item.coverImage}" alt="${item.title}">
            <div class="admin-book-info">
              <p class="title">${item.title}</p>
              <p class="meta">${item.category} · ৳${item.currentPrice}${item.inStock === false ? ' · স্টকে নেই' : ''}</p>
            </div>
            <button class="icon-btn edit-btn" data-id="${item.id}" aria-label="সম্পাদনা"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn danger delete-btn" data-id="${item.id}" aria-label="মুছুন"><i class="fa-solid fa-trash"></i></button>
          </div>
        `).join('');

        listEl.querySelectorAll('.edit-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const item = liveItems.find((i) => i.id === btn.dataset.id);
            if (item) fillForm(item);
          });
        });
        listEl.querySelectorAll('.delete-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (!confirm('এই পণ্যটি মুছে ফেলতে চান?')) return;
            await deleteDecorItem(btn.dataset.id);
            loadItems();
          });
        });
      } catch (err) {
        console.error(err);
        listEl.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>পণ্য লোড করা যায়নি। Firebase কনফিগারেশন যাচাই করুন।</p></div>`;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.style.display = 'none';
      submitBtn.disabled = true;

      try {
        const data = readForm();
        if (editingId) {
          await updateDecorItem(editingId, data);
        } else {
          await addDecorItem(data);
        }
        resetForm();
        loadItems();
      } catch (err) {
        console.error(err);
        formError.textContent = 'সংরক্ষণ করা যায়নি। আবার চেষ্টা করুন।';
        formError.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    loadItems();
  </script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
