<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novaris — বই পরিচালনা</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="owner-bar">
    <div class="owner-bar-inner">
      <div class="owner-bar-links">
        <a href="dashboard.html">অর্ডার</a>
        <a href="admin.html" class="active">বই পরিচালনা</a>
        <a href="admin-decor.html">ডেকর পরিচালনা</a>
      </div>
      <button class="owner-logout" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> লগআউট</button>
    </div>
  </div>

  <div class="container">
    <h1 style="margin-top: 24px;">বই পরিচালনা</h1>

    <div class="admin-grid">
      <div class="card">
        <h2 id="form-title">নতুন বই যোগ করুন</h2>
        <form id="book-form">
          <div class="form-group">
            <label class="form-label" for="f-title">শিরোনাম *</label>
            <input class="form-input" id="f-title" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-author">লেখক *</label>
            <input class="form-input" id="f-author" required>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="f-pages">পৃষ্ঠা *</label>
              <input class="form-input" type="number" id="f-pages" min="1" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-genre">জনরা *</label>
              <input class="form-input" id="f-genre" placeholder="যেমন: বিজ্ঞান" required>
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="f-current-price">বর্তমান মূল্য *</label>
              <input class="form-input" type="number" id="f-current-price" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-regular-price">নিয়মিত মূল্য</label>
              <input class="form-input" type="number" id="f-regular-price" min="0">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-cover">কভার ছবির URL *</label>
            <input class="form-input" type="url" id="f-cover" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-description">বিবরণ</label>
            <textarea class="form-textarea" id="f-description"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-publisher">প্রকাশনী</label>
            <input class="form-input" id="f-publisher">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-edition">সংস্করণ</label>
            <input class="form-input" id="f-edition">
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="f-binding">বাঁধাই</label>
              <select class="form-select" id="f-binding">
                <option value="">— নির্বাচন করুন —</option>
                <option value="Paperback">Paperback</option>
                <option value="Hardcover">Hardcover</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-paper">কাগজ</label>
              <select class="form-select" id="f-paper">
                <option value="">— নির্বাচন করুন —</option>
                <option value="White print">White print</option>
                <option value="Newsprint">Newsprint</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">
              <input type="checkbox" id="f-instock" checked style="width:auto; margin-right:6px;">
              স্টকে আছে
            </label>
          </div>

          <p class="form-error" id="form-error" style="display:none;"></p>

          <div style="display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary" id="submit-btn">
              <i class="fa-solid fa-plus"></i> যোগ করুন
            </button>
            <button type="button" class="btn btn-outline" id="cancel-edit-btn" style="display:none;">বাতিল</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>বর্তমান বইসমূহ</h2>
        <div id="books-list">
          <p class="loading-state">লোড হচ্ছে…</p>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script type="module">
    import { requireAuth, logoutUser } from './auth.js';
    import { fetchBooksLive, addBook, updateBook, deleteBook } from './admin.js';

    await requireAuth();

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await logoutUser();
      window.location.href = 'login.html';
    });

    const form = document.getElementById('book-form');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-edit-btn');
    const formError = document.getElementById('form-error');
    const listEl = document.getElementById('books-list');

    const fields = {
      title: document.getElementById('f-title'),
      author: document.getElementById('f-author'),
      pages: document.getElementById('f-pages'),
      genre: document.getElementById('f-genre'),
      currentPrice: document.getElementById('f-current-price'),
      regularPrice: document.getElementById('f-regular-price'),
      coverImage: document.getElementById('f-cover'),
      description: document.getElementById('f-description'),
      publisher: document.getElementById('f-publisher'),
      edition: document.getElementById('f-edition'),
      bindingType: document.getElementById('f-binding'),
      paperType: document.getElementById('f-paper'),
      inStock: document.getElementById('f-instock')
    };

    let editingId = null;

    function resetForm() {
      form.reset();
      fields.inStock.checked = true;
      editingId = null;
      formTitle.textContent = 'নতুন বই যোগ করুন';
      submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> যোগ করুন';
      cancelBtn.style.display = 'none';
    }

    function fillForm(book) {
      fields.title.value = book.title || '';
      fields.author.value = book.author || '';
      fields.pages.value = book.pages || '';
      fields.genre.value = book.genre || '';
      fields.currentPrice.value = book.currentPrice || '';
      fields.regularPrice.value = book.regularPrice || '';
      fields.coverImage.value = book.coverImage || '';
      fields.description.value = book.description || '';
      fields.publisher.value = book.publisher || '';
      fields.edition.value = book.edition || '';
      fields.bindingType.value = book.bindingType || '';
      fields.paperType.value = book.paperType || '';
      fields.inStock.checked = book.inStock !== false;

      editingId = book.id;
      formTitle.textContent = 'বই সম্পাদনা করুন';
      submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> আপডেট করুন';
      cancelBtn.style.display = 'inline-flex';
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function readForm() {
      const data = {
        title: fields.title.value.trim(),
        author: fields.author.value.trim(),
        pages: parseInt(fields.pages.value, 10) || 0,
        genre: fields.genre.value.trim(),
        currentPrice: parseFloat(fields.currentPrice.value) || 0,
        coverImage: fields.coverImage.value.trim(),
        description: fields.description.value.trim(),
        publisher: fields.publisher.value.trim(),
        edition: fields.edition.value.trim(),
        bindingType: fields.bindingType.value,
        paperType: fields.paperType.value,
        inStock: fields.inStock.checked
      };
      if (fields.regularPrice.value) {
        data.regularPrice = parseFloat(fields.regularPrice.value);
      } else if (editingId) {
        // Editing an existing book with the field left blank means
        // "remove the discount" — send null so admin.js can tell
        // Firestore to delete the field instead of keeping the old value.
        data.regularPrice = null;
      }
      return data;
    }

    async function loadBooks() {
      try {
        const liveBooks = await fetchBooksLive();
        if (liveBooks.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-book"></i>
              <p>এখনো কোনো বই যোগ করা হয়নি।</p>
            </div>
          `;
          return;
        }
        listEl.innerHTML = liveBooks.map((book) => `
          <div class="admin-book-row">
            <img class="admin-book-thumb" src="${book.coverImage}" alt="${book.title}">
            <div class="admin-book-info">
              <p class="title">${book.title}</p>
              <p class="meta">${book.author} · ৳${book.currentPrice} · ${book.genre}${book.inStock === false ? ' · স্টকে নেই' : ''}</p>
            </div>
            <button class="icon-btn edit-btn" data-id="${book.id}" aria-label="সম্পাদনা"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn danger delete-btn" data-id="${book.id}" aria-label="মুছুন"><i class="fa-solid fa-trash"></i></button>
          </div>
        `).join('');

        listEl.querySelectorAll('.edit-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const book = liveBooks.find((b) => b.id === btn.dataset.id);
            if (book) fillForm(book);
          });
        });
        listEl.querySelectorAll('.delete-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (!confirm('এই বইটি মুছে ফেলতে চান?')) return;
            await deleteBook(btn.dataset.id);
            loadBooks();
          });
        });
      } catch (err) {
        console.error(err);
        listEl.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>বই লোড করা যায়নি। Firebase কনফিগারেশন যাচাই করুন।</p></div>`;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.style.display = 'none';
      submitBtn.disabled = true;

      try {
        const data = readForm();
        if (editingId) {
          await updateBook(editingId, data);
        } else {
          await addBook(data);
        }
        resetForm();
        loadBooks();
      } catch (err) {
        console.error(err);
        formError.textContent = 'সংরক্ষণ করা যায়নি। আবার চেষ্টা করুন।';
        formError.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    loadBooks();
  </script>
  <script type="module" src="footer.js"></script>
</body>
</html>
